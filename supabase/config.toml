[project]
id = "assetvault"
name = "AssetVault"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
max_freemium_users = 50
rate_limit_token_length = 0
rate_limit_count = 0
rate_limit_window_ms = 0


[storage]
enabled = true
file_size_limit = "5MB"